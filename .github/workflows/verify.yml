name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  engine-tests:
    name: Engine Tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/wave
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/wave/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  engine-typecheck:
    name: Engine Typecheck (tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/wave
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/wave/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck
